name: Deploy Flash Mode

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  STACK_NAME: ${{ vars.STACK_NAME || 'flash-mode-backend' }}
  S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  deploy-backend:
    name: Deploy SAM backend
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.get-url.outputs.api_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build --template-file template.yaml

      - name: SAM deploy
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides "Environment=prod" "GroqApiKey=${{ env.GROQ_API_KEY }}" \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Seed DynamoDB tables
        working-directory: backend
        env:
          ENV: prod
          PRODUCTS_TABLE: Products-prod
          BUNDLES_TABLE: Bundles-prod
          SESSIONS_TABLE: Sessions-prod
        run: python scripts/seed_dynamodb.py

      - name: Get API Gateway URL
        id: get-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "Deployed API URL: ${API_URL}"

  deploy-frontend:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ needs.deploy-backend.outputs.api_url }}
        run: |
          npm ci
          npm run build

      - name: Deploy to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ "s3://${{ env.S3_BUCKET_NAME }}/" --delete

      - name: Invalidate CloudFront
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
